<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý Sản phẩm</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f4f4;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#2c7be5;
color:white;
cursor:pointer;
}

tbody tr:nth-child(even){
background:#f2f2f2;
}

tbody tr:hover{
background:#dfefff;
}

.form-box{
margin-top:30px;
background:white;
padding:20px;
border:1px solid #ccc;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Quản lý Danh sách Sản phẩm</h1>

<table id="product-table">

<thead>
<tr>
<th>STT</th>
<th id="sort-name">Tên sản phẩm</th>
<th>Danh mục</th>
<th>Đơn giá</th>
<th>Số lượng</th>
</tr>
</thead>

<tbody>
</tbody>

</table>


<div class="form-box">

<h3>Thêm sản phẩm</h3>

<input id="input-name" placeholder="Tên sản phẩm">

<input id="input-category" placeholder="Danh mục">

<input id="input-price" type="number" placeholder="Đơn giá">

<input id="input-quantity" type="number" placeholder="Số lượng">

<button id="btn-add">Thêm</button>

</div>


<script>

let products=[]
let sortAsc=true

const tableBody=document.querySelector("#product-table tbody")

function renderTable(){

tableBody.innerHTML=""

products.forEach((p,index)=>{

let row=document.createElement("tr")

row.innerHTML=`
<td>${index+1}</td>
<td>${p.name}</td>
<td>${p.category}</td>
<td>${p.price}</td>
<td>${p.quantity}</td>
`

tableBody.appendChild(row)

})

}

const xhr=new XMLHttpRequest()

xhr.onreadystatechange=function(){

if(xhr.readyState===4 && xhr.status===200){

products=JSON.parse(xhr.responseText)

renderTable()

}

}

xhr.open("GET","products.json")

xhr.send()



document.getElementById("sort-name").addEventListener("click",function(){

products.sort(function(a,b){

if(sortAsc){

return a.name.localeCompare(b.name)

}else{

return b.name.localeCompare(a.name)

}

})

sortAsc=!sortAsc

this.innerHTML="Tên sản phẩm "+(sortAsc?"▲":"▼")

renderTable()

})



document.getElementById("btn-add").addEventListener("click",function(){

let name=document.getElementById("input-name").value.trim()
let category=document.getElementById("input-category").value.trim()
let price=parseFloat(document.getElementById("input-price").value)
let quantity=parseInt(document.getElementById("input-quantity").value)

if(name.length<3){
alert("Tên sản phẩm phải ít nhất 3 ký tự")
return
}

if(price<=0 || isNaN(price)){
alert("Đơn giá phải là số dương")
return
}

if(quantity<1 || isNaN(quantity)){
alert("Số lượng phải >=1")
return
}

let newProduct={
id:products.length+1,
name:name,
category:category,
price:price,
quantity:quantity
}

products.push(newProduct)

renderTable()

document.getElementById("input-name").value=""
document.getElementById("input-category").value=""
document.getElementById("input-price").value=""
document.getElementById("input-quantity").value=""

})

</script>

</body>
</html>
