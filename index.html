<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        h1 { text-align: center; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; cursor: pointer; }
        th:hover { background-color: #45a049; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #e9f5e9; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #btn-add { width: 100%; margin-top: 10px; }
        .sort-icon { margin-left: 5px; }
        .message { margin-top: 10px; padding: 10px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quản lý Sản phẩm</h1>

        <div class="form-container">
            <h2>Thêm sản phẩm mới</h2>
            <div class="form-group">
                <label for="input-name">Tên sản phẩm</label>
                <input type="text" id="input-name">
            </div>
            <div class="form-group">
                <label for="input-category">Danh mục</label>
                <input type="text" id="input-category">
            </div>
            <div class="form-group">
                <label for="input-price">Đơn giá</label>
                <input type="number" id="input-price" min="0">
            </div>
            <div class="form-group">
                <label for="input-quantity">Số lượng</label>
                <input type="number" id="input-quantity" min="1">
            </div>
            <button id="btn-add">Thêm sản phẩm</button>
            <div id="message" class="message"></div>
        </div>

        <h2>Danh sách sản phẩm</h2>
        <table id="product-table">
            <thead>
                <tr>
                    <th>STT</th>
                    <th id="name-header">Tên sản phẩm <span class="sort-icon" id="sort-icon"></span></th>
                    <th>Danh mục</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                </tr>
            </thead>
            <tbody id="product-body"></tbody>
        </table>
    </div>

    <script>
        let products = [];
        let sortDirection = 1;

        // Lấy các element
        const productBody = document.getElementById('product-body');
        const nameHeader = document.getElementById('name-header');
        const sortIcon = document.getElementById('sort-icon');
        const btnAdd = document.getElementById('btn-add');
        const messageDiv = document.getElementById('message');

        function renderTable(data) {
            productBody.innerHTML = '';
            data.forEach((product, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${product.name}</td>
                    <td>${product.category || ''}</td>
                    <td>${Number(product.price).toLocaleString('vi-VN')} đ</td>
                    <td>${product.quantity}</td>
                `;
                productBody.appendChild(tr);
            });
        }

        function sortByName() {
            sortDirection = -sortDirection;
            products.sort((a, b) => a.name.localeCompare(b.name) * sortDirection);
            sortIcon.textContent = sortDirection > 0 ? '▲' : '▼';
            renderTable(products);
        }

        function addProduct() {
            const name = document.getElementById('input-name').value.trim();
            const category = document.getElementById('input-category').value.trim();
            const price = parseFloat(document.getElementById('input-price').value);
            const quantity = parseInt(document.getElementById('input-quantity').value);

            if (name.length < 3) {
                showMessage("Tên sản phẩm phải có ít nhất 3 ký tự!", "red");
                return;
            }
            if (isNaN(price) || price <= 0) {
                showMessage("Đơn giá phải là số dương!", "red");
                return;
            }
            if (isNaN(quantity) || quantity < 1) {
                showMessage("Số lượng phải là số nguyên >= 1!", "red");
                return;
            }

            products.push({
                id: Date.now(),
                name: name,
                category: category,
                price: price,
                quantity: quantity
            });

            renderTable(products);

            // Reset form
            document.getElementById('input-name').value = '';
            document.getElementById('input-category').value = '';
            document.getElementById('input-price').value = '';
            document.getElementById('input-quantity').value = '';

            showMessage("Thêm sản phẩm thành công!", "green");
        }

        function showMessage(msg, color) {
            messageDiv.textContent = msg;
            messageDiv.style.color = color;
            setTimeout(() => messageDiv.textContent = '', 3000);
        }

        // Load dữ liệu
        function loadProducts() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    products = JSON.parse(xhr.responseText);
                    renderTable(products);
                }
            };
            xhr.open("GET", "products.json", true);
            xhr.send();
        }

        // Gắn sự kiện
        nameHeader.addEventListener("click", sortByName);
        btnAdd.addEventListener("click", addProduct);

        // Khởi chạy load dữ liệu
        loadProducts();
    </script>
</body>
</html>
